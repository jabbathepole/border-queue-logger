name: DPSU 403 Probe (temporary)

# TEMPORARY diagnostic — manual only. Tests whether dpsu.gov.ua's 403 against the
# GitHub-hosted runner is a header/fingerprint block (defeatable, like eCherga's
# Akamai) or a pure datacenter-IP/ASN block (needs a non-datacenter egress).
# Curls the page with several header sets from the runner and prints HTTP codes.
# Read-only: no commits, no secrets. Delete this file once the question is answered.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe dpsu.gov.ua from runner IP
        run: |
          URL="https://dpsu.gov.ua/uk/map"
          probe () {
            local label="$1"; shift
            code=$(curl -sS --compressed -o /dev/null -w "%{http_code}" --max-time 30 "$@" "$URL" || echo "curl-err")
            printf '%-40s HTTP %s\n' "$label" "$code"
          }

          echo "Runner public IP: $(curl -sS --max-time 15 https://api.ipify.org || echo unknown)"
          echo "------------------------------------------------------------"

          # A. Baseline: honest descriptive UA (what the real scraper sends via requests)
          probe "A honest-UA (current scraper)" \
            -H "User-Agent: border-queue-logger/0.1 (+https://github.com/jabbathepole/border-queue-logger; contact d.jablonski97@gmail.com)" \
            -H "Accept-Language: uk"

          # B. Browser UA only (minimal eCherga-style)
          probe "B browser-UA only" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -H "Accept-Language: uk-UA,uk;q=0.9,en;q=0.8"

          # C. Full Chrome header set (UA + Accept + sec-ch-ua + sec-fetch + upgrade)
          probe "C full-browser-headers" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8" \
            -H "Accept-Language: uk-UA,uk;q=0.9,en;q=0.8" \
            -H "sec-ch-ua: \"Not_A Brand\";v=\"8\", \"Chromium\";v=\"120\", \"Google Chrome\";v=\"120\"" \
            -H "sec-ch-ua-mobile: ?0" \
            -H "sec-ch-ua-platform: \"Windows\"" \
            -H "sec-fetch-dest: document" \
            -H "sec-fetch-mode: navigate" \
            -H "sec-fetch-site: none" \
            -H "sec-fetch-user: ?1" \
            -H "upgrade-insecure-requests: 1"

          echo "------------------------------------------------------------"
          echo "If A/B/C are all 403 => pure IP/ASN block (headers cannot fix; need proxy or self-hosted)."
          echo "If C (or B) is 200 => header/fingerprint block (a curl+browser-header change fixes it for free)."
