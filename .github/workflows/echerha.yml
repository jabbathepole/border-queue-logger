name: Scrape eCherga Workload

# Scheduled scraper for the UA-side eCherga virtual-queue data
# (back.echerha.gov.ua workload JSON API). Mirror of scrape.yml.
on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:           # manual trigger

permissions:
  contents: write
  issues: write

# Shared with scrape.yml so the two loggers never push to the repo at the
# same time (avoids non-fast-forward push failures on the same branch).
concurrency:
  group: border-data-commit
  cancel-in-progress: false

jobs:
  scrape-echerha:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run eCherga scraper
        id: scrape
        run: python echerha_scraper.py
        continue-on-error: true

      - name: Open issue on failure
        if: steps.scrape.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "eCherga scraper failure $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --body "$(cat <<'EOF'
          The scheduled eCherga scraper failed.

          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Check the logs above. Common causes:
          - back.echerha.gov.ua unreachable / Akamai blocking the runner IP
          - Required headers (X-Client-Locale, X-User-Agent) rejected → 401
          - Workload JSON structure changed
          - New/renamed Poland checkpoint not in crossings.py (logged as "Unmapped")

          Investigate before the next scheduled run.
          EOF
          )" \
            --label bug 2>/dev/null || \
          gh issue create \
            --title "eCherga scraper failure $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --body "eCherga scraper failed. See run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Commit updated data
        if: steps.scrape.outcome == 'success'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/echerha.db data/echerha_*.csv
          git diff --cached --quiet && echo "No new data to commit" || \
            git commit -m "data: echerha scrape $(date -u +%Y-%m-%dT%H:%MZ)"

      - name: Push
        if: steps.scrape.outcome == 'success'
        run: |
          # Rebase onto any commits the granica logger pushed meanwhile.
          git pull --rebase --autostash origin "${{ github.ref_name }}" || true
          git push

      - name: Fail the job if scrape failed
        if: steps.scrape.outcome == 'failure'
        run: exit 1
