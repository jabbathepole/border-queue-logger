name: Scrape DPSU Border Map

# Scheduled scraper for the UA-side DPSU physical truck-queue data
# (dpsu.gov.ua/uk/map — Series C, UA->PL physical). Mirror of echerha.yml.
# The source refreshes only every ~3 h, but we poll every 30 min: the
# UNIQUE(crossing_id, source_updated_utc) constraint dedupes the repeats, and
# over-sampling guards against the source's staggered per-crossing batches.
on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:           # manual trigger

permissions:
  contents: write
  issues: write

# Shared with scrape.yml / echerha.yml so the loggers never push to the repo at
# the same time (avoids non-fast-forward push failures on the same branch).
concurrency:
  group: border-data-commit
  cancel-in-progress: false

jobs:
  scrape-dpsu:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run DPSU scraper
        id: scrape
        env:
          # Routes the fetch through a clean-ASN VPS proxy so dpsu.gov.ua's
          # Cloudflare layer doesn't 403 the GitHub runner's Azure IP. Set this
          # repo secret to http://user:pass@<vps-ip>:<port>. If unset, the
          # scraper connects directly (and will 403 on a GitHub runner).
          DPSU_PROXY_URL: ${{ secrets.DPSU_PROXY_URL }}
        run: python dpsu_scraper.py
        continue-on-error: true

      - name: Open issue on failure
        if: steps.scrape.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "DPSU scraper failure $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --body "$(cat <<'EOF'
          The scheduled DPSU scraper failed.

          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Check the logs above. Common causes:
          - dpsu.gov.ua/uk/map unreachable / intermittent bot-block on the runner IP
          - Page structure changed (the <select id="by_name"> options / data-* attributes)
          - New/renamed Poland crossing not in DPSU_NAME_TO_CANONICAL (hard-fails by design;
            add it + record an INCIDENTS.md entry)
          - Validation failed (a priority crossing missing)

          Investigate before the next scheduled run.
          EOF
          )" \
            --label bug 2>/dev/null || \
          gh issue create \
            --title "DPSU scraper failure $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --body "DPSU scraper failed. See run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Commit updated data
        if: steps.scrape.outcome == 'success'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dpsu.db data/dpsu_*.csv
          git diff --cached --quiet && echo "No new data to commit" || \
            git commit -m "data: dpsu scrape $(date -u +%Y-%m-%dT%H:%MZ)"

      - name: Push
        if: steps.scrape.outcome == 'success'
        run: |
          # Rebase onto any commits the other loggers pushed meanwhile.
          git pull --rebase --autostash origin "${{ github.ref_name }}" || true
          git push

      - name: Fail the job if scrape failed
        if: steps.scrape.outcome == 'failure'
        run: exit 1
