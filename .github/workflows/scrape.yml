name: Scrape Border Queues

on:
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours
  workflow_dispatch:         # manual trigger

permissions:
  contents: write
  issues: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        id: scrape
        run: python scraper.py
        continue-on-error: true

      - name: Open issue on failure
        if: steps.scrape.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Scraper failure $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --body "$(cat <<'EOF'
          The scheduled scraper failed.

          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Check the logs above. Common causes:
          - granica.gov.pl unreachable
          - SOAP response structure changed
          - New/removed crossing names

          Investigate before the next scheduled run.
          EOF
          )" \
            --label bug 2>/dev/null || \
          gh issue create \
            --title "Scraper failure $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --body "Scraper failed. See run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Commit updated data
        if: steps.scrape.outcome == 'success'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No new data to commit" || \
            git commit -m "data: scrape $(date -u +%Y-%m-%dT%H:%MZ)"

      - name: Push
        if: steps.scrape.outcome == 'success'
        run: git push

      - name: Fail the job if scrape failed
        if: steps.scrape.outcome == 'failure'
        run: exit 1
