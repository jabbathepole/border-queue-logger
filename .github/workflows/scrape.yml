name: Scrape Border Queues

# Scheduled scraper for PL-UA border queue data (granica.gov.pl SOAP API)
on:
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours
  workflow_dispatch:         # manual trigger

permissions:
  contents: write
  issues: write

# Shared with echerha.yml so the two loggers never push to the repo at the
# same time (avoids non-fast-forward push failures on the same branch).
concurrency:
  group: border-data-commit
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        id: scrape
        run: python scraper.py
        continue-on-error: true

      - name: Open issue on failure
        if: steps.scrape.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Scraper failure $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --body "$(cat <<'EOF'
          The scheduled scraper failed.

          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Check the logs above. Common causes:
          - granica.gov.pl unreachable
          - SOAP response structure changed
          - New/removed crossing names

          Investigate before the next scheduled run.
          EOF
          )" \
            --label bug 2>/dev/null || \
          gh issue create \
            --title "Scraper failure $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --body "Scraper failed. See run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Commit updated data
        if: steps.scrape.outcome == 'success'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No new data to commit" || \
            git commit -m "data: scrape $(date -u +%Y-%m-%dT%H:%MZ)"

      - name: Push
        id: push
        if: steps.scrape.outcome == 'success'
        continue-on-error: true
        run: |
          # Rebase onto any commits the eCherga logger pushed meanwhile, so a
          # concurrent push doesn't reject ours (mirrors echerha.yml). The
          # shared concurrency group should serialise the two loggers, but in
          # practice they can still overlap — rebase-before-push is the
          # reliable guard.
          git pull --rebase --autostash origin "${{ github.ref_name }}" || true
          git push

      - name: Open issue on push failure
        if: steps.push.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Scraper push failure $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --body "$(cat <<'EOF'
          The scrape succeeded but the push to the data branch failed — the
          scraped data point was NOT saved (silent data loss until now).

          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Common cause: a non-fast-forward race with the eCherga logger that
          the rebase-before-push did not resolve. Check the push step logs.
          EOF
          )" \
            --label bug 2>/dev/null || \
          gh issue create \
            --title "Scraper push failure $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --body "Scrape succeeded but push failed (data not saved). See run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Fail the job if scrape or push failed
        if: steps.scrape.outcome == 'failure' || steps.push.outcome == 'failure'
        run: exit 1
